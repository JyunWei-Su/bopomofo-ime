<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注音輸入法</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1c1c1e; --surface: #2c2c2e; --surface2: #3a3a3c;
  --border: #48484a; --text: #f2f2f7; --text2: #aeaeb2;
  --accent: #0a84ff; --yellow: #ffd60a; --orange: #ff9f0a;
}
body {
  font-family: -apple-system,'PingFang TC','Noto Sans TC',sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 28px 16px 60px; gap: 16px;
}
.header { text-align: center; }
.header h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: .15em; }
.header p  { font-size: .75rem; color: var(--text2); margin-top: 4px; }

/* Mode row */
.mode-row { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 700px; }
.mode-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 20px; font-size: .8rem; font-weight: 600;
  cursor: pointer; user-select: none; border: 1.5px solid transparent; transition: all .15s;
}
.mode-badge.zh { background: rgba(10,132,255,.15); border-color: rgba(10,132,255,.4); color: #60aaff; }
.mode-badge.en { background: rgba(48,209,88,.12); border-color: rgba(48,209,88,.35); color: #30d158; }
.mode-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.status-text { font-size: .73rem; color: var(--text2); flex: 1; }

/* Composing bar */
#composingBar {
  width: 100%; max-width: 700px; min-height: 34px;
  padding: 5px 12px; border-radius: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  opacity: 0; transition: opacity .15s; pointer-events: none;
}
#composingBar.active { opacity: 1; pointer-events: auto; }
#composingBopo { font-size: 1rem; color: var(--yellow); font-weight: 700; letter-spacing: .1em; }
#composingTone { font-size: .85rem; color: var(--orange); }
.comp-hint { font-size: .68rem; color: var(--text2); margin-left: auto; }

/* Candidate panel */
#candidatePanel {
  position: fixed; z-index: 9999;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.7);
  display: none; min-width: 200px; max-width: 320px; overflow: hidden;
}
#candidatePanel.visible { display: block; }
.cand-header {
  padding: 6px 12px 4px; font-size: .68rem; color: var(--text2);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between;
}
.cand-bopo { color: var(--yellow); font-weight: 700; }
#candidateList { list-style: none; padding: 4px 0; max-height: 260px; overflow-y: auto; }
#candidateList li {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; cursor: pointer; font-size: 1.05rem; transition: background .08s;
}
#candidateList li:hover { background: var(--surface2); }
#candidateList li.selected { background: var(--accent); color: #fff; }
#candidateList li .idx { font-size: .65rem; color: var(--text2); font-family: monospace; min-width: 12px; }
#candidateList li.selected .idx { color: rgba(255,255,255,.55); }
.cand-footer { padding: 4px 12px; font-size: .65rem; color: var(--text2); border-top: 1px solid var(--border); text-align: center; }

/* Output textarea */
#output {
  width: 100%; max-width: 700px; min-height: 240px;
  padding: 14px; border-radius: 10px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); font-size: 1.15rem; line-height: 1.9;
  font-family: inherit; outline: none; resize: vertical;
  caret-color: var(--accent); transition: border-color .2s;
}
#output:focus { border-color: var(--accent); }

/* Controls */
.ctrl-row { display: flex; gap: 8px; width: 100%; max-width: 700px; flex-wrap: wrap; }
.btn {
  padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: .8rem;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.btn:hover { background: var(--surface2); color: var(--text); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { opacity: .85; }

/* Help pills */
.help-row { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; max-width: 700px; }
.pill {
  background: var(--surface); border-radius: 6px; padding: 4px 9px;
  font-size: .7rem; color: var(--text2); display: flex; align-items: center; gap: 4px;
}
.pill kbd {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 5px; font-size: .68rem; color: var(--text); font-family: monospace;
}

/* Keymap */
.keymap-wrap { width: 100%; max-width: 700px; }
.keymap-toggle {
  font-size: .76rem; color: var(--text2); cursor: pointer;
  letter-spacing: .06em; padding: 4px 0;
  display: flex; align-items: center; gap: 5px; user-select: none;
}
.arrow { display: inline-block; transition: transform .2s; }
.keymap-toggle.open .arrow { transform: rotate(90deg); }
.keymap-grid {
  display: grid; grid-template-columns: repeat(auto-fill,minmax(50px,1fr));
  gap: 4px; margin-top: 8px; overflow: hidden; max-height: 0; transition: max-height .3s;
}
.keymap-grid.open { max-height: 400px; }
.key-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 5px 2px; text-align: center; }
.kc { display: block; font-family: monospace; font-size: .78rem; color: var(--accent); font-weight: 700; }
.kb { display: block; font-size: .88rem; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <h1>注音輸入法</h1>
  <p>離線 &middot; 繁體中文 &middot; 大千式 &middot; 中英混打</p>
</div>

<div class="mode-row">
  <div class="mode-badge zh" id="modeBadge" onclick="toggleMode()">
    <span class="mode-dot"></span><span id="modeText">中文</span>
  </div>
  <div class="status-text" id="statusText">Shift 切換中英文模式</div>
</div>

<div id="composingBar">
  <span id="composingBopo"></span>
  <span id="composingTone"></span>
  <span class="comp-hint">↑↓ 選字 &nbsp;·&nbsp; Space/6/3/4/7 聲調自動上字 &nbsp;·&nbsp; Enter 首字 &nbsp;·&nbsp; Esc 取消</span>
</div>

<div id="candidatePanel">
  <div class="cand-header">
    <span>候選：<span class="cand-bopo" id="candBopo"></span></span>
    <span id="candPage"></span>
  </div>
  <ul id="candidateList"></ul>
  <div class="cand-footer">↑↓ 移動選字 &nbsp;·&nbsp; PgUp/PgDn 換頁 &nbsp;·&nbsp; 1–9 快選</div>
</div>

<textarea id="output" placeholder="在此輸入 — 中英文皆可，Shift 切換模式" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>

<div class="ctrl-row">
  <button class="btn primary" onclick="copyOutput()">複製全文</button>
  <button class="btn" onclick="clearOutput()">清除</button>
  <button class="btn" onclick="toggleMode()">切換中 / 英</button>
</div>

<div class="help-row">
  <div class="pill"><kbd>Shift</kbd> 切換中英</div>
  <div class="pill"><kbd>Space</kbd>一聲 <kbd>6</kbd>二 <kbd>3</kbd>三 <kbd>4</kbd>四 <kbd>7</kbd>輕 → 自動上字</div>
  <div class="pill"><kbd>Space</kbd><kbd>Enter</kbd> 選首字</div>
  <div class="pill"><kbd>↑</kbd><kbd>↓</kbd> 瀏覽候選</div>
  <div class="pill"><kbd>PgDn</kbd><kbd>PgUp</kbd> 換頁</div>
  <div class="pill"><kbd>1–9</kbd> 快速選字</div>
  <div class="pill"><kbd>Esc</kbd> 取消組字</div>
  <div class="pill"><kbd>Bksp</kbd> 刪注音</div>
</div>

<div class="keymap-wrap">
  <div class="keymap-toggle" id="keymapToggle" onclick="toggleKeymap()">
    <span class="arrow">▶</span> 注音鍵盤對照（大千式）
  </div>
  <div class="keymap-grid" id="keymapGrid"></div>
</div>

// State

let mode = 'zh';

let tone = '1';
let candidates = [];
let selIdx = 0;
let page = 0;
const PAGE = 9;

const TONE_MARKS = {'1':'','2':'ˊ','3':'ˇ','4':'ˋ','5':'˙'};

const output    = document.getElementById('output');
const compBar   = document.getElementById('composingBar');
const compBopo  = document.getElementById('composingBopo');

// ═══════════════════════════════════════════════
// Lookup
// ═══════════════════════════════════════════════
function lookup() {
  const base = composing.join('');
  const byTone = D[base + tone] || [];
  const all = [];
  // Put current-tone chars first
  byTone.forEach(c => { if (!all.includes(c)) all.push(c); });
  // Then fill from all tones
  for (const t of ['1','2','3','4','5']) {
    const k = base + t;
    if (D[k]) D[k].forEach(c => { if (!all.includes(c)) all.push(c); });
  }
  return all;
}

// ═══════════════════════════════════════════════
// UI update
// ═══════════════════════════════════════════════
function updateUI() {
  const has = composing.length > 0;
  compBar.classList.toggle('active', has);
  if (!has) { hideCandidates(); return; }

  compBopo.textContent = composing.join('');
  compTone.textContent = TONE_MARKS[tone];
  candBopo.textContent = composing.join('') + TONE_MARKS[tone];

  candidates = lookup();
  // Keep selIdx on same page but clamp
  selIdx = Math.min(selIdx, Math.max(candidates.length - 1, 0));
  page = Math.floor(selIdx / PAGE);
  renderList();
}

function renderList() {
  if (candidates.length === 0) {
    candList.innerHTML = '<li style="color:#666;font-size:.85rem;padding:8px 14px">找不到候選字</li>';
    candPageEl.textContent = '';
  } else {
    const s = page * PAGE;
    const total = Math.ceil(candidates.length / PAGE);
    candPageEl.textContent = `${page+1}/${total}`;
    candList.innerHTML = candidates.slice(s, s + PAGE).map((ch, i) => {
      const gi = s + i;
      return `<li class="${gi===selIdx?'selected':''}" data-gi="${gi}">
        <span class="idx">${i+1}</span>${ch}</li>`;
    }).join('');
    const el = candList.querySelector('.selected');
    if (el) el.scrollIntoView({ block: 'nearest' });
  }
  showPanel();
}

function showPanel() { candPanel.classList.add('visible'); posPanel(); }
function hideCandidates() { candPanel.classList.remove('visible'); }

function posPanel() {
  const r = output.getBoundingClientRect();
  const ph = candPanel.offsetHeight || 160;
  let top = r.top - ph - 8;
  if (top < 10) top = r.bottom + 8;
  candPanel.style.left = r.left + 'px';
  candPanel.style.top = top + 'px';
}

// ═══════════════════════════════════════════════
// Insert / Commit
// ═══════════════════════════════════════════════
function insertAt(text) {
  const s = output.selectionStart, e = output.selectionEnd;
  output.value = output.value.slice(0, s) + text + output.value.slice(e);
  output.selectionStart = output.selectionEnd = s + text.length;
}

function commitChar(ch) { insertAt(ch); reset(); }

function commitFirst() {
  if (candidates.length > 0) commitChar(candidates[selIdx] ?? candidates[0]);
  else { insertAt(composing.join('')); reset(); }
}

function reset() {
  composing = []; tone = '1'; candidates = []; selIdx = 0; page = 0;
  updateUI();
}

// ═══════════════════════════════════════════════
// Mode
// ═══════════════════════════════════════════════
function setMode(m) {
  mode = m;
  modeBadge.className = 'mode-badge ' + m;
  modeText.textContent = m === 'zh' ? '中文' : 'English';
  statusText.textContent = m === 'zh' ? 'Shift 切換為英文模式' : 'Shift 切換為中文模式';
  if (m === 'en' && composing.length > 0) commitFirst();
}
function toggleMode() { setMode(mode === 'zh' ? 'en' : 'zh'); }

// ═══════════════════════════════════════════════
// Key handler
// ═══════════════════════════════════════════════
output.addEventListener('keydown', e => {
  const key = e.key;
  if (e.ctrlKey || e.metaKey) return; // allow ctrl shortcuts

  // Shift toggles mode (only when NOT composing)
  if (key === 'Shift') {
    if (composing.length === 0) { e.preventDefault(); toggleMode(); }
    return;
  }

  // English mode: let everything pass through
  if (mode === 'en') return;

  // ── Escape
  if (key === 'Escape') {
    if (composing.length > 0) { e.preventDefault(); reset(); }
    return;
  }

  // ── Backspace
  if (key === 'Backspace') {
    if (composing.length > 0) {
      e.preventDefault();
      composing.pop(); tone = '1'; selIdx = 0; page = 0;
      if (composing.length === 0) reset(); else updateUI();
    }
    return;
  }

  // ── Enter / Space = commit first
  if (key === 'Enter' || key === ' ') {
    if (composing.length > 0) { e.preventDefault(); commitFirst(); }
    return;
  }

  // ── Arrow Up / Down = move selection
  if (key === 'ArrowUp' || key === 'ArrowDown') {
    if (composing.length > 0) {
      e.preventDefault();
      selIdx += key === 'ArrowDown' ? 1 : -1;
      selIdx = Math.max(0, Math.min(selIdx, candidates.length - 1));
      page = Math.floor(selIdx / PAGE);
      renderList();
    }
    return;
  }

  // ── PageDown / Right = next page
  if (key === 'PageDown' || key === 'ArrowRight') {
    if (composing.length > 0) {
      e.preventDefault();
      const maxPage = Math.ceil(candidates.length / PAGE) - 1;
      page = Math.min(page + 1, maxPage);
      selIdx = page * PAGE;
      renderList();
    }
    return;
  }

  // ── PageUp / Left = prev page
  if (key === 'PageUp' || key === 'ArrowLeft') {
    if (composing.length > 0) {
      e.preventDefault();
      page = Math.max(page - 1, 0);
      selIdx = page * PAGE;
      renderList();
    }
    return;
  }

  // ── Tone keys (only when composing): Space=1聲, 6=2聲, 3=3聲, 4=4聲, 8=輕聲
  // Map input key → internal tone digit
  const TONE_KEY_MAP = {'6':'2','3':'3','4':'4','7':'5'};
  if (composing.length > 0 && TONE_KEY_MAP[key]) {
    e.preventDefault();
    tone = TONE_KEY_MAP[key]; selIdx = 0; page = 0;
    candidates = lookup();
    if (candidates.length > 0) commitChar(candidates[0]);
    else { insertAt(composing.join('') + TONE_MARKS[tone]); reset(); }
    return;
  }

  // ── Number 1-9 pick candidate (only keys not used as tones: 1,2,5,7,9)
  if (/^[1-9]$/.test(key) && composing.length > 0 && !TONE_KEY_MAP[key]) {
    const pick = page * PAGE + parseInt(key) - 1;
    if (pick < candidates.length) {
      e.preventDefault();
      selIdx = pick;
      commitChar(candidates[pick]);
    }
    return;
  }

  // ── Bopomofo key
  const kl = key.toLowerCase();
  if (KEYMAP[kl] !== undefined) {
    e.preventDefault();
    composing.push(KEYMAP[kl]);
    tone = '1'; selIdx = 0; page = 0;
    updateUI();
    return;
  }

  // ── Non-bopomofo non-special key while composing → commit first
  if (composing.length > 0) {
    commitFirst();
    // Let the key fall through to be inserted normally
  }
});

// Candidate click
candList.addEventListener('click', e => {
  const li = e.target.closest('li[data-gi]');
  if (!li) return;
  selIdx = parseInt(li.dataset.gi);
  commitChar(candidates[selIdx]);
});

// Reposition on resize/scroll
window.addEventListener('resize', () => { if (candPanel.classList.contains('visible')) posPanel(); });
window.addEventListener('scroll', () => { if (candPanel.classList.contains('visible')) posPanel(); }, true);

// ═══════════════════════════════════════════════
// Keymap display
// ═══════════════════════════════════════════════
function initKeymap() {
  const grid = document.getElementById('keymapGrid');
  [['1','2','3','4','5','6','7','8','9','0','-'],
   ['q','w','e','r','t','y','u','i','o','p'],
   ['a','s','d','f','g','h','j','k','l',';'],
   ['z','x','c','v','b','n','m',',','.','/' ]
  ].flat().forEach(k => {
    if (!KEYMAP[k]) return;
    const d = document.createElement('div');
    d.className = 'key-cell';
    d.innerHTML = `<span class="kc">${k.toUpperCase()}</span><span class="kb">${KEYMAP[k]}</span>`;
    grid.appendChild(d);
  });
}
function toggleKeymap() {
  const g = document.getElementById('keymapGrid');
  const t = document.getElementById('keymapToggle');
  const o = g.classList.toggle('open');
  t.classList.toggle('open', o);
}

// ═══════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════
function copyOutput() {
  output.select();
  navigator.clipboard.writeText(output.value).catch(() => document.execCommand('copy'));
  statusText.textContent = '✓ 已複製到剪貼板';
  setTimeout(() => setMode(mode), 2000);
}
function clearOutput() { output.value = ''; reset(); output.focus(); }

// Init
initKeymap();
setMode('zh');
output.focus();
</script>
